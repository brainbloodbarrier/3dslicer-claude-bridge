# Auto-label PRs based on changed file paths.
#
# Prerequisites: the labels referenced in .github/labeler.yml must exist in the
# repository. See that file for the full list of `gh label create` commands.

name: Auto Label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
          sync-labels: true
